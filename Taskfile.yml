version: '3'

includes:
  client:
    taskfile: ./client/Taskfile.yml
    dir: ./client
  server:
    taskfile: ./server/Taskfile.yml
    dir: ./server
  iac:
    taskfile: ./iac/Taskfile.yml
    dir: ./iac

tasks:
  serve:
    desc: Watch client and server files, rebuild and restart on changes
    cmds:
      - task -p client:watch server:watch

  deploy:
    desc: Build frontend, then deploy the full stack to fly.io
    deps: [client:build]
    cmds:
      - flyctl deploy --config iac/fly.toml

  test:
    desc: Run Cucumber integration tests (requires server on :8090)
    cmds:
      - npm test

  default:
    internal: true
    cmds:
      - task --list
