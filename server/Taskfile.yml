version: '3'

tasks:
  init:
    desc: Download Go dependencies (run once after cloning)
    cmds:
      - go mod tidy

  build:
    desc: Compile the PocketBase binary to build/pocketbase
    deps: [init]
    cmds:
      - go build -o ../build/pocketbase .

  dev:
    desc: Run PocketBase locally (serves on :8090)
    cmds:
      - go run . serve --publicDir=../build/public

  watch:
    desc: Watch Go files and restart the server on changes
    watch: true
    sources:
      - '*.go'
      - go.mod
    cmds:
      - go build -o ../build/pocketbase . && ../build/pocketbase serve --publicDir=../build/public
