version: '3'

tasks:
  install:
    desc: Install frontend dependencies
    cmds:
      - npm install

  dev:
    desc: Start dev server with hot module replacement
    deps: [install]
    cmds:
      - npm run dev

  watch:
    desc: Watch source files and rebuild to build/public/
    deps: [install]
    watch: true
    sources:
      - src/**/*
      - index.html
      - vite.config.js
    cmds:
      - npm run build

  build:
    desc: Build for production (outputs to build/public/)
    deps: [install]
    cmds:
      - npm run build

  preview:
    desc: Preview the production build locally
    deps: [build]
    cmds:
      - npm run preview
